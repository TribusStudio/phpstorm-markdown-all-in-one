name: Build, Test & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep '^pluginVersion' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "artifact_name=markdown-all-in-one-${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'

      - name: Build, Test & Package
        run: gradle clean build test buildPlugin --no-build-cache

      - name: Sign plugin
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "$CERTIFICATE_CHAIN" ]; then
            gradle signPlugin
          else
            echo "Signing secrets not configured, skipping plugin signing"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/distributions/*.zip

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
          ARTIFACT: ${{ needs.build.outputs.artifact_name }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/phpstorm-markdown-all-in-one/updatePlugins.xml
        run: |
          TAG="v${VERSION}"

          # Find the previous release tag to collect commits since then
          git fetch --tags
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            echo "Collecting commits since $PREV_TAG..."
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "No previous tag found, collecting all commits..."
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG exists, updating..."
            gh release upload "$TAG" "dist/${ARTIFACT}" --clobber
          else
            echo "Creating release $TAG..."
            NOTES="$(cat <<NOTESEOF
          ## Markdown All-in-One v${VERSION}

          ### Changes

          ${COMMITS}

          ### Install
          1. Download \`${ARTIFACT}\` below
          2. PHPStorm > Settings > Plugins > gear icon > Install from disk
          3. Select the downloaded .zip
          4. Restart PHPStorm

          ### Auto-update
          Add this custom plugin repository in Settings > Plugins > gear icon > Manage Plugin Repositories:
          \`\`\`
          ${PAGES_URL}
          \`\`\`
          NOTESEOF
          )"
            # Strip leading whitespace from heredoc
            NOTES=$(echo "$NOTES" | sed 's/^          //')
            gh release create "$TAG" "dist/${ARTIFACT}" --title "v${VERSION}" --notes "$NOTES"
          fi

  update-repo:
    needs: [build, release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate updatePlugins.xml
        env:
          VERSION: ${{ needs.build.outputs.version }}
          ARTIFACT: ${{ needs.build.outputs.artifact_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p _site
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${ARTIFACT}"
          cat > _site/updatePlugins.xml <<XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <plugin id="com.tribus.markdown-all-in-one" url="${DOWNLOAD_URL}" version="${VERSION}">
              <idea-version since-build="251"/>
              <name>Markdown All-in-One</name>
              <vendor>Tribus</vendor>
              <description>Comprehensive Markdown editing for PHPStorm</description>
            </plugin>
          </plugins>
          XMLEOF
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' _site/updatePlugins.xml
          echo "Generated updatePlugins.xml:"
          cat _site/updatePlugins.xml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
